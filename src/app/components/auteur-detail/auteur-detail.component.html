<div class="container mt-4" *ngIf="auteur; else loading">
  <div class="card shadow">
    
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <h3 class="mb-0">Détails de l'auteur</h3>
      <a routerLink="/auteurs" class="btn btn-sm btn-outline-light">
        ⬅ Retour à la liste
      </a>
    </div>
    
    <div class="card-body">
      <h4 class="card-title text-primary fw-bold">{{ auteur.nom }}</h4>
      <hr>
      
      <p class="card-text">
        <strong>Date de naissance : </strong> 
        {{ auteur.dateNaissance ? (auteur.dateNaissance | date:'dd/MM/yyyy') : 'Non renseignée' }}
      </p>
      
      <p class="card-text">
        <strong>Biographie : </strong><br>
        {{ auteur.biographie }}
      </p>

      <div class="mt-4">
        <a [routerLink]="['/auteurs/modifier', auteur._id]" class="btn btn-warning me-2">
          Modifier cet auteur
        </a>
        <button (click)="supprimerAuteur()" class="btn btn-danger">
          Supprimer
        </button>
      </div>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="alert alert-info mt-4 text-center">
    Chargement des détails de l'auteur... ⏳
  </div>
</ng-template>
