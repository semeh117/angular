<div class="container mt-4" *ngIf="livre">
  <div class="card shadow">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <h2 class="mb-0">{{ livre.titre }}</h2>
      <span class="badge" [ngClass]="livre.disponibilite ? 'bg-success' : 'bg-danger'">
        {{ livre.disponibilite ? 'Disponible' : 'Indisponible' }}
      </span>
    </div>
    
    <div class="card-body">
      <h4 class="card-title text-muted mb-4">
        Auteur : {{ livre.auteur?.nom || livre.auteur || 'Auteur inconnu' }}
      </h4>
      
      <h5>Résumé :</h5>
      <p class="card-text">{{ livre.resume || 'Aucun résumé disponible pour ce livre.' }}</p>
    </div>
    
    <div class="card-footer text-center">
      <a routerLink="/livres" class="btn btn-outline-secondary">Retour à la liste</a>
    </div>
  </div>
</div>

<div class="text-center mt-5" *ngIf="!livre">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Chargement...</span>
  </div>
</div>
